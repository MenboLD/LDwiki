<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f17" />
  <title>ld_editboard</title>
  <link rel="stylesheet" href="ld_editboard.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">盤面エディタ</div>

    <div class="topbar__right">
      <div class="toggle">
        <input id="editToggle" type="checkbox" />
        <label for="editToggle" class="toggle__ui pressable" aria-label="編集モード">
          <span class="toggle__knob"></span>
        </label>
        <span class="toggle__label">編集</span>
      </div>

      <button class="btn pressable" id="undoBtn" type="button" title="戻す">↶</button>
      <button class="btn pressable" id="redoBtn" type="button" title="やり直し">↷</button>
      <button class="btn btn--danger pressable" id="clearBtn" type="button">全消し</button>
    </div>
  </header>

  <main class="main" id="main">
    <section class="boardWrap">
      <div id="board" class="board" aria-label="盤面"></div>
    </section>
  </main>

  <section class="paletteArea" id="paletteArea" aria-label="パレット">
    <div class="paletteTop">
      <div class="tabs" id="rankTabs" aria-label="ランクタブ"></div>
    </div>

    <div id="palette" class="palette" aria-label="ユニットパレット"></div>

    <!-- スクロール帯（パレット下：フル幅） -->
    <div class="scrollPad scrollPad--bottom" id="scrollPad" aria-label="パレットスクロール（ここを左右になぞる）"
      title="ここを左右になぞると上のアイコンがスクロールします">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  </section>

  <button class="bottomBar pressable" id="bottomBar" type="button" aria-label="設定を開閉">
    <span id="barIcon">▲</span>
  </button>

  <section class="settingsPanel" id="settingsPanel" aria-label="設定">
    <div class="settingsInner">
      <div class="segRow" aria-label="盤面種類">
        <button class="seg pressable" data-layout="nhpt_single" type="button">ノ/地/太(片)</button>
        <button class="seg pressable" data-layout="hg_single" type="button">ハ/神(片)</button>
        <button class="seg pressable" data-layout="nhpt_both" type="button">ノ/地/太(両)</button>
        <button class="seg pressable" data-layout="hg_both" type="button">ハ/神(両)</button>
        <button class="seg pressable" data-layout="raid" type="button">レイド</button>
        <button class="seg pressable" data-layout="limit" type="button">限界</button>
        <button class="seg pressable" data-layout="infinite" type="button">無限</button>
      </div>

      <div class="btnRow">
        <button class="btn btn--ghost pressable" id="shareBtn" type="button">共有URL</button>
      </div>

      <div class="grid2">
        <div class="grid2__col">
          <div class="miniTitle">セーブ</div>
          <div class="grid3">
            <button class="btn btn--ghost pressable" data-save="1" type="button">セーブ1</button>
            <button class="btn btn--ghost pressable" data-save="2" type="button">セーブ2</button>
            <button class="btn btn--ghost pressable" data-save="3" type="button">セーブ3</button>
          </div>
        </div>

        <div class="grid2__col">
          <div class="miniTitle">ロード</div>
          <div class="grid3">
            <button class="btn btn--ghost pressable" data-load="1" type="button">ロード1</button>
            <button class="btn btn--ghost pressable" data-load="2" type="button">ロード2</button>
            <button class="btn btn--ghost pressable" data-load="3" type="button">ロード3</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js"></script>
  <script src="ld_editboard.js"></script>
</body>
</html>

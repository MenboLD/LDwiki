<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f17" />
  <title>ld_editboard</title>
  <link rel="stylesheet" href="ld_editboard.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">盤面エディタ</div>

    <div class="topbar__right">
<button class="btn pressable" id="undoBtn" type="button" title="戻す">↶</button>
      <button class="btn pressable" id="redoBtn" type="button" title="やり直し">↷</button>
      <button class="btn btn--danger pressable" id="clearBtn" type="button">全消し</button>
    </div>
  </header>

  <main class="main" id="main">
    <section class="boardWrap">
      <div id="board" class="board" aria-label="盤面"></div>
    </section>

    <section class="paletteArea" id="paletteArea" aria-label="パレット">
      
      <div class="paletteTop">
        <div class="tabs" id="rankTabs" aria-label="ランクタブ"></div>

        <div class="modeSwitch" id="modeSwitch" aria-label="配置/情報切替">
          <span class="modeLabel pressable" id="modePlaceLbl">配置</span>
          <label class="miniToggle pressable" aria-label="配置/情報">
            <input id="infoToggle" type="checkbox" />
            <span class="miniToggle__ui"><span class="miniToggle__knob"></span></span>
          </label>
          <span class="modeLabel pressable" id="modeInfoLbl">情報</span>
        </div>
      </div>


      <div id="palette" class="palette" aria-label="ユニットパレット"></div>

      <div id="infoPanel" class="infoPanel" aria-label="情報パネル"></div>

      <div class="scrollPad scrollPad--bottom pressable" id="scrollPad"
        aria-label="パレットスクロール（ここを左右になぞる）"
        title="ここを左右になぞると上のアイコンがスクロールします">ここで左右にスクロール</div>
    </section>
  </main>

  <!-- Bottom segmented tabs -->
  <div class="bottomTabs" id="bottomTabs" role="tablist" aria-label="設定タブ">
    <button class="bottomTab pressable" id="tabLayout" type="button" role="tab" aria-selected="false">盤面種類</button>
    <button class="bottomTab pressable" id="tabSave" type="button" role="tab" aria-selected="false">保存読込</button>
  </div>

<section class="settingsPanel" id="settingsPanel" aria-label="設定">
    
    <div class="settingsInner">

      <div class="settingsPane" id="paneLayout" data-pane="layout">
        <div class="layoutGrid" aria-label="盤面種類">
          <div class="layoutRow">
            <button class="seg pressable" data-layout="nhpt_single" type="button">通常</button>
            <button class="seg pressable" data-layout="nhpt_both" type="button">通常 (両面)</button>
          </div>
          <div class="layoutRow">
            <button class="seg pressable" data-layout="hg_single" type="button">ハード or 神</button>
            <button class="seg pressable" data-layout="hg_both" type="button">ハード or 神 (両面)</button>
          </div>
          <div class="layoutRow layoutRow--three">
            <button class="seg pressable" data-layout="raid" type="button">レイド</button>
            <button class="seg pressable" data-layout="limit" type="button">限界</button>
            <button class="seg pressable" data-layout="infinite" type="button">無限</button>
          </div>
        </div>
      </div>


      <div class="settingsPane" id="paneSave" data-pane="save">
        <div class="saveGrid" aria-label="保存読込">
          <div class="saveRow saveRow--three">
            <button class="seg pressable" data-save="1" type="button">セーブ1</button>
            <button class="seg pressable" data-save="2" type="button">セーブ2</button>
            <button class="seg pressable" data-save="3" type="button">セーブ3</button>
          </div>
          <div class="saveRow saveRow--three">
            <button class="seg pressable" data-load="1" type="button">ロード1</button>
            <button class="seg pressable" data-load="2" type="button">ロード2</button>
            <button class="seg pressable" data-load="3" type="button">ロード3</button>
          </div>
          <div class="saveRow saveRow--one">
            <button class="seg pressable" id="shareBtn" type="button">共有URLをコピーする</button>
          </div>
        </div>
      </div>

    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js"></script>
  <script src="ld_editboard.js"></script>
</body>
</html>

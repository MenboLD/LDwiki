<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f17" />
  <title>ld_editboard</title>
  <link rel="stylesheet" href="ld_editboard.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__left">
      <div class="brand">
        <div class="brand__title">盤面エディタ</div>
        <div class="brand__sub">下のパレットからドラッグして配置（iPhone mini下限想定）</div>
      </div>
    </div>

    <div class="topbar__right">
      <div class="ctl">
        <label class="ctl__label" for="rowsSel">行</label>
        <select id="rowsSel" class="ctl__select" aria-label="行数">
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
      </div>

      <div class="ctl">
        <span class="ctl__label">列</span>
        <span class="pill" id="colsLabel">6</span>
      </div>

      <div class="toggle">
        <input id="editToggle" type="checkbox" />
        <label for="editToggle" class="toggle__ui" aria-label="編集モード">
          <span class="toggle__knob"></span>
        </label>
        <span class="toggle__label">編集</span>
      </div>

      <button class="btn" id="undoBtn" type="button" title="戻す">↶</button>
      <button class="btn" id="redoBtn" type="button" title="やり直し">↷</button>
      <button class="btn btn--danger" id="clearBtn" type="button">全消し</button>

      <button class="btn btn--ghost" id="shareBtn" type="button">共有URL</button>
      <button class="btn btn--primary" id="saveLocalBtn" type="button">端末保存</button>
    </div>
  </header>

  <main class="main">
    <section class="boardWrap">
      <div class="boardHeader">
        <div class="boardHeader__left">
          <div class="hint">
            編集ON：盤面ユニットをタップすると形態変化（mode=true のとき after に切替）
            <span class="hint__dot">•</span>
            編集OFF：盤面ユニットもドラッグで移動（盤外に落とすと削除）
          </div>
        </div>
        <div class="boardHeader__right">
          <div class="trash" id="trash" aria-label="ゴミ箱" title="ここに落とすと削除">🗑</div>
        </div>
      </div>

      <div id="board" class="board" aria-label="盤面"></div>
    </section>
  </main>

  <footer class="paletteBar" aria-label="パレット">
    <div class="paletteBar__top">
      <div class="tabs" id="rankTabs" aria-label="ランクタブ"></div>

      <div class="paletteBar__row2">
        <input id="searchInput" class="search" type="search" placeholder="検索（code / 名前）" inputmode="search" />
        <button class="btn btn--ghost" id="loadLocalBtn" type="button">端末読込</button>
        <button class="btn btn--ghost" id="exportBtn" type="button">JSON</button>
        <button class="btn btn--ghost" id="onlineBtn" type="button">Supabase</button>
      </div>
    </div>

    <div id="palette" class="palette" aria-label="ユニットパレット"></div>
  </footer>

  <!-- Supabase (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js"></script>
  <script src="ld_editboard.js"></script>
</body>
</html>

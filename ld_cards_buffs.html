<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>バフカード一覧</title>
  <meta name="description" content="ラッキー傭兵団：バフカード一覧（効果検索・手動並び替え）" />
  <link rel="stylesheet" href="./ld_cards_buffs.css" />
</head>
<body class="hide-vis hide-op">
  <header class="top">
    <div class="wrap">
      <div class="top-row">
        <h1>バフカード一覧</h1>

        <div class="top-actions">
          <button class="reset-btn" id="resetSortBtn" type="button" title="ソート順をリセット">リセット</button>
          <div class="modes" role="tablist" aria-label="モード切替">
            <button class="mode-btn is-active" data-mode="太初" role="tab" aria-selected="true">太初</button>
            <button class="mode-btn" data-mode="対戦" role="tab" aria-selected="false">対戦</button>
            <button class="mode-btn" data-mode="無限" role="tab" aria-selected="false">無限</button>
          </div>
        </div>
      </div>

      <div class="top-sub">
        <div class="hint">操作：<span class="kbd">▲</span> 上と入替 / <span class="kbd">▼</span> 下と入替 / <span class="kbd">T</span> 先頭へ</div>
        <div class="status" id="statusText">準備中…</div>
      </div>

      <div class="controls">
        <label class="toggle">
          <input type="checkbox" id="opToggle" />
          <span class="toggle-ui" aria-hidden="true"></span>
          <span class="toggle-text">操作列を表示</span>
        </label>

        <label class="toggle">
          <input type="checkbox" id="visToggle" />
          <span class="toggle-ui" aria-hidden="true"></span>
          <span class="toggle-text">表示列を表示</span>
        </label>

        <label class="toggle">
          <input type="checkbox" id="gradeSortToggle" />
          <span class="toggle-ui" aria-hidden="true"></span>
          <span class="toggle-text">レアリティ順</span>
        </label>

        <div class="search">
          <input id="noteSearch" type="search" inputmode="search" autocomplete="off" placeholder="効果で検索（部分一致）" />
          <button class="clear" id="clearSearch" type="button" title="クリア">×</button>
        </div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="table-wrap" role="region" aria-label="バフカード一覧表">
        <table class="ld-table" id="buffTable">
          <colgroup>
            <col class="w-vis">
            <col class="w-op">
            <col class="w-img">
            <col class="w-name">
            <col class="w-note">
          </colgroup>
          <thead>
            <tr>
              <th scope="col" class="th-vis">表示</th>
              <th scope="col" class="th-op">操作</th>
              <th scope="col" class="th-img">画像</th>
              <th scope="col" class="th-name">名称</th>
              <th scope="col" class="th-note">効果</th>
            </tr>
          </thead>
          <tbody id="buffTbody">
            <tr><td class="empty" colspan="5">読み込み中…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <div class="toast" id="toast" aria-live="polite" aria-atomic="true"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./supabase_config.js" onerror="/* optional */"></script>
  <script src="./ld_cards_buffs.js"></script>
</body>
</html>
